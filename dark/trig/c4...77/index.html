<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>404 — Страница не найдена</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="error-card">
      <h1 class="error-code">404</h1>
      <p id="errorSubtitle" class="error-subtitle">Кажется, такой страницы не существует.</p>
      <p class="error-text">
        <span id="errorLine1">Возможно, ты ошибся адресом.</span>
        <br />
        <span id="errorLine2">Или просто заблудился в кибер-подсветке.</span>
      </p>

      <a id="linkHome" href="/ru/" class="link-home">
        <span class="link-home-label">Вернуться на главную</span>
        <span aria-hidden="true">↩</span>
      </a>

      <p id="serviceMessage" class="service-message">
        <span class="msg-text"></span>
        <a
          id="msgLink"
          href="media/dark-trigger.jpg"
          target="_blank"
          rel="noopener"
        >
          заглянуть сюда.
        </a>
      </p>
    </div>

    <div id="customPrompt" class="modal">
      <div class="modal-content">
        <div class="convariant">
          <div class="circle"></div>
          <div class="emoji">🎉</div>
        </div>
        <h2 class="title"></h2>
        <p class="subtitle"></p>
        <input type="text" id="promptInput" placeholder="Ваш Nickname" />
        <div class="buttons">
          <button type="button" id="confirmBtn">OK</button>
          <button type="button" id="cancelBtn" class="cancel">Отмена</button>
        </div>
      </div>
    </div>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
